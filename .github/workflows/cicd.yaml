name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${IMAGE_NAME,,}:latest .
          docker push ghcr.io/${IMAGE_NAME,,}:latest

      - name: Run the application
        run: |
          ssh ec2-user@ec2-35-159-18-159.eu-central-1.compute.amazonaws.com
          docker run -p 8080:8080 alwazery/alwazery:falskappv7.0.0
